<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ball | אלון בלס | שחם מעבדת תרבות</title>
  <link rel="icon" href="/shaham-icon.png" type="image/png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --white: #f0f0f0;
      --pink: #c8588c;
      --pink-soft: rgba(200, 88, 140, 0.15);
      --green: #6dba5e;
      --green-soft: rgba(109, 186, 94, 0.12);
      --gray: #999;
      --gray-dark: #161616;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      height: 100dvh;
      position: relative;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
    }

    /* Header */
    header {
      padding: 10px 20px 8px;
      text-align: center;
      border-bottom: 1px solid rgba(200, 88, 140, 0.12);
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.8);
      position: relative;
      z-index: 1;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 4px;
    }

    .header-logo-shaham {
      height: 32px;
      filter: invert(1);
    }

    .header-title-img {
      height: 48px;
    }

    .header-artist {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--white);
      margin-top: 2px;
    }

    .header-curator {
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--gray);
      margin-top: 1px;
    }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
      position: relative;
      z-index: 1;
    }

    .welcome-message {
      text-align: center;
      padding: 16px 20px;
      color: var(--gray);
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .welcome-message .welcome-title {
      font-size: 1.1rem;
      color: var(--pink);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .welcome-message .welcome-accent {
      color: var(--green);
      font-weight: 700;
    }

    .message {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.7;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: rgba(200, 88, 140, 0.18);
      color: var(--white);
      border: 1px solid rgba(200, 88, 140, 0.2);
      border-bottom-left-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: rgba(22, 22, 22, 0.9);
      color: var(--white);
      border: 1px solid rgba(109, 186, 94, 0.1);
      border-bottom-right-radius: 4px;
    }

    .message img.user-image {
      max-width: 200px;
      max-height: 150px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: block;
    }

    .typing-indicator {
      align-self: flex-start;
      padding: 12px 20px;
      background: rgba(22, 22, 22, 0.9);
      border-radius: 16px;
      border: 1px solid rgba(109, 186, 94, 0.1);
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      animation: bounce 1.4s ease-in-out infinite;
    }

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid rgba(200, 88, 140, 0.12);
      background: rgba(10, 10, 10, 0.95);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    .image-preview {
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px 12px;
      background: rgba(200, 88, 140, 0.1);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--pink);
    }

    .image-preview img {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 6px;
    }

    .image-preview .remove-image {
      margin-right: auto;
      margin-left: 0;
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0 4px;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    #imageInput {
      display: none;
    }

    .btn-upload {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(200, 88, 140, 0.2);
      background: transparent;
      color: var(--pink);
      font-size: 1.3rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-upload:active {
      background: rgba(200, 88, 140, 0.1);
    }

    #textInput {
      flex: 1;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--white);
      font-family: 'Heebo', sans-serif;
      font-size: 0.95rem;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      direction: rtl;
    }

    #textInput::placeholder {
      color: var(--gray);
    }

    #textInput:focus {
      border-color: var(--green);
    }

    .btn-send {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--green);
      color: var(--black);
      font-size: 1.2rem;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .btn-send:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .btn-send:active:not(:disabled) {
      opacity: 0.8;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 8px;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.2);
      flex-shrink: 0;
      position: relative;
      z-index: 1;
    }

    /* Markdown formatting in responses */
    .message.assistant p { margin-bottom: 8px; }
    .message.assistant p:last-child { margin-bottom: 0; }
    .message.assistant strong { color: var(--green); }

    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: rgba(200, 88, 140, 0.2); border-radius: 2px; }

    /* Safe area for notched phones */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .input-area { padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

  <img src="/ball-bg.jpg" alt="" class="bg-overlay">

  <header>
    <div class="header-top">
      <img src="/ball-header.png" alt="Ball" class="header-title-img">
      <img src="/shaham-logo.png" alt="שחם מעבדת תרבות" class="header-logo-shaham">
    </div>
    <div class="header-artist">אלון בלס &middot; Alon Balas</div>
    <div class="header-curator">אוצרת: שרון בלבן</div>
  </header>

  <div id="chat">
    <div class="welcome-message">
      <div class="welcome-title">ברוכים הבאים לתערוכה</div>
      צלמו את מה שאתם רואים או שאלו שאלה —<br>
      ואני אעזור לכם לחקור את היצירה.<br><br>
      <span style="direction:ltr;display:inline-block;font-size:0.8rem;color:var(--gray)">
        Take a photo or ask a question about the installation you're viewing.
      </span>
    </div>
  </div>

  <div class="input-area">
    <div class="image-preview" id="imagePreview">
      <img id="previewImg" src="" alt="preview">
      <span id="previewName">image.jpg</span>
      <button class="remove-image" onclick="removeImage()" aria-label="Remove image">&times;</button>
    </div>
    <div class="input-row">
      <button class="btn-upload" onclick="document.getElementById('imageInput').click()" aria-label="Upload image">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      </button>
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp,image/gif" onchange="handleImageSelect(event)">
      <textarea id="textInput" placeholder="שאלו על היצירה..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <footer>שחם מעבדת תרבות &middot; Shaham Cultural Laboratory</footer>

  <script>
    const chat = document.getElementById('chat');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const previewImg = document.getElementById('previewImg');
    const previewName = document.getElementById('previewName');

    let selectedFile = null;
    let conversationHistory = [];

    function compressImage(file, maxSizeMB = 3.5) {
      return new Promise((resolve) => {
        const maxBytes = maxSizeMB * 1024 * 1024;
        if (file.size <= maxBytes) { resolve(file); return; }
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          const maxDim = 1600;
          if (w > maxDim || h > maxDim) {
            const scale = maxDim / Math.max(w, h);
            w = Math.round(w * scale);
            h = Math.round(h * scale);
          }
          canvas.width = w;
          canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob((blob) => {
            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
          }, 'image/jpeg', 0.75);
        };
        img.src = URL.createObjectURL(file);
      });
    }

    function handleImageSelect(e) {
      const file = e.target.files[0];
      if (!file) return;
      compressImage(file).then(compressed => {
        selectedFile = compressed;
        previewImg.src = URL.createObjectURL(compressed);
        previewName.textContent = compressed.name;
        imagePreview.style.display = 'flex';
      });
    }

    function removeImage() {
      selectedFile = null;
      imageInput.value = '';
      imagePreview.style.display = 'none';
      URL.revokeObjectURL(previewImg.src);
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function addMessage(role, text, imageDataUrl) {
      const welcome = chat.querySelector('.welcome-message');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;

      if (role === 'user') {
        if (imageDataUrl) {
          const img = document.createElement('img');
          img.src = imageDataUrl;
          img.className = 'user-image';
          div.appendChild(img);
        }
        if (text) {
          const p = document.createElement('p');
          p.textContent = text;
          div.appendChild(p);
        }
      } else {
        div.innerHTML = formatResponse(text);
      }

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function formatResponse(text) {
      return text
        .split('\n\n')
        .map(para => `<p>${para.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>')}</p>`)
        .join('');
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'typing-indicator';
      div.id = 'typing';
      div.innerHTML = '<span></span><span></span><span></span>';
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      const el = document.getElementById('typing');
      if (el) el.remove();
    }

    async function sendMessage() {
      const text = textInput.value.trim();
      if (!text && !selectedFile) return;

      let imageDataUrl = null;
      if (selectedFile) {
        imageDataUrl = await fileToDataUrl(selectedFile);
      }
      addMessage('user', text, imageDataUrl);

      // Build JSON payload with base64 image
      const historyForApi = conversationHistory.map(msg => ({
        role: msg.role,
        content: msg.role === 'user' ? msg.textOnly || msg.content : msg.content
      }));

      const payload = { text, history: historyForApi };
      if (imageDataUrl) {
        // Strip "data:image/jpeg;base64," prefix
        const [meta, b64] = imageDataUrl.split(',');
        payload.image_b64 = b64;
        payload.image_type = meta.match(/:(.*?);/)[1];
      }

      textInput.value = '';
      textInput.style.height = 'auto';
      removeImage();
      sendBtn.disabled = true;

      showTyping();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        hideTyping();

        if (data.error) {
          addMessage('assistant', 'מצטער, אירעה שגיאה. נסו שוב.');
        } else {
          addMessage('assistant', data.response);
          conversationHistory.push({
            role: 'user',
            content: text || '(image)',
            textOnly: text || 'The visitor shared a photo of the installation.'
          });
          conversationHistory.push({
            role: 'assistant',
            content: data.response
          });
        }
      } catch (err) {
        hideTyping();
        addMessage('assistant', 'שגיאת חיבור. בדקו את החיבור לאינטרנט ונסו שוב.');
      }

      sendBtn.disabled = false;
    }

    function fileToDataUrl(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      });
    }

    textInput.focus();
  </script>
</body>
</html>
